name: Run

on:
  schedule:
    - cron: '1 0 * * *' # Run every day at 1:00 am UTC (9:00 pm EST)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build + validate, publish nothing)'
        type: boolean
        default: true

permissions:
  contents: write  # push the tsei-storage.json commit
  id-token: write  # OIDC trusted publishing to npm

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'node' # latest; satisfies trusted-publishing Node >=22.14 requirement

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest # OIDC trusted publishing requires npm >=11.5.1

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-

      - name: Install Packages
        run: yarn install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Run
        run: yarn run run
        env:
          CI: true
          NODE_ENV: debug
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }} # scheduled runs publish; manual defaults to dry
